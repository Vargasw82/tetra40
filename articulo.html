<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artículo — TETRA 4.0</title>
    <link rel="icon" type="image/png" href="T40Favico.png">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="visual-boost.css">
    <style>
        :root {
            --blue-primary: #0060a0;
            --blue-medium:  #0e6ba8;
            --dark:         #0a1628;
        }

        /* ── Hero del artículo ── */
        .article-hero {
            background: linear-gradient(135deg, var(--dark) 0%, #1a3a5c 100%);
            padding: 120px 3rem 60px;
            text-align: center;
            color: white;
            position: relative;
            overflow: hidden;
        }
        .article-hero::before {
            content: '';
            position: absolute; inset: 0;
            background: radial-gradient(circle at 30% 50%, rgba(14,107,168,0.35), transparent 60%),
                        radial-gradient(circle at 75% 20%, rgba(0,96,160,0.25), transparent 50%);
        }
        .article-hero-inner { position: relative; z-index: 2; max-width: 780px; margin: 0 auto; }
        .article-category {
            display: inline-block;
            background: rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.9);
            font-size: 0.75rem; font-weight: 700;
            letter-spacing: 1px; text-transform: uppercase;
            padding: 5px 14px; border-radius: 20px;
            margin-bottom: 20px;
        }
        .article-hero h1 {
            font-size: clamp(1.8rem, 4vw, 3rem);
            font-weight: 800; line-height: 1.2;
            margin-bottom: 18px; color: white;
        }
        .article-meta {
            display: flex; align-items: center; justify-content: center; gap: 20px;
            font-size: 0.85rem; color: rgba(255,255,255,0.65);
            margin-top: 10px;
        }
        .article-meta span { display: flex; align-items: center; gap: 5px; }

        /* ── Imagen destacada ── */
        .article-cover {
            width: 100%; max-width: 860px; margin: -40px auto 0;
            display: block; position: relative; z-index: 3;
            border-radius: 20px; overflow: hidden;
            box-shadow: 0 24px 64px rgba(0,0,0,0.18);
        }
        .article-cover img {
            width: 100%; max-height: 480px; object-fit: cover; display: block;
        }
        .article-cover-emoji {
            width: 100%; height: 300px;
            background: linear-gradient(135deg, var(--blue-medium) 0%, var(--dark) 100%);
            display: flex; align-items: center; justify-content: center;
            font-size: 5rem;
        }

        /* ── Cuerpo del artículo ── */
        .article-body {
            max-width: 760px; margin: 0 auto;
            padding: 56px 3rem 80px;
        }
        .article-body p {
            font-size: 1.05rem; line-height: 1.85; color: #374151;
            margin-bottom: 1.4em;
        }
        .article-body h2 {
            font-size: 1.5rem; font-weight: 700; color: var(--dark);
            margin: 2em 0 0.7em;
        }
        .article-body h3 {
            font-size: 1.2rem; font-weight: 700; color: var(--dark);
            margin: 1.6em 0 0.6em;
        }
        .article-body ul, .article-body ol {
            padding-left: 1.5em; margin-bottom: 1.4em;
        }
        .article-body li { font-size: 1.05rem; line-height: 1.8; color: #374151; margin-bottom: 0.4em; }
        .article-body strong { color: var(--dark); }
        .article-body a { color: var(--blue-medium); text-decoration: underline; }

        /* Excerpt en grande si no hay cuerpo */
        .article-excerpt-big {
            font-size: 1.2rem; line-height: 1.75; color: #4b5563;
            font-style: italic; border-left: 4px solid var(--blue-medium);
            padding-left: 20px; margin-bottom: 2em;
        }

        /* ── Sin contenido ── */
        .no-body-notice {
            background: #f0f7ff; border: 1px solid #bfdbfe;
            border-radius: 12px; padding: 24px 28px;
            color: #1e40af; font-size: 0.92rem; line-height: 1.6;
        }

        /* ── Back link & CTA ── */
        .article-nav {
            max-width: 760px; margin: 0 auto;
            padding: 0 3rem 32px;
            display: flex; align-items: center; gap: 16px;
        }
        .back-link {
            display: inline-flex; align-items: center; gap: 8px;
            color: var(--blue-medium); font-size: 0.88rem; font-weight: 600;
            text-decoration: none; transition: gap .2s;
        }
        .back-link:hover { gap: 12px; }
        .back-link svg { width: 16px; height: 16px; flex-shrink: 0; }

        /* ── Estado de carga / error ── */
        .article-state {
            min-height: 60vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            text-align: center; padding: 60px 2rem; color: #6b7280;
        }
        .article-state .state-icon { font-size: 3rem; margin-bottom: 16px; }
        .article-state h2 { font-size: 1.3rem; font-weight: 700; color: var(--dark); margin-bottom: 8px; }
        .article-state p  { font-size: 0.9rem; }
        .article-state a  { color: var(--blue-medium); font-weight: 600; text-decoration: none; }

        @media (max-width: 768px) {
            .article-hero { padding: 110px 1.5rem 50px; }
            .article-body, .article-nav { padding-left: 1.5rem; padding-right: 1.5rem; }
            .article-cover { margin-top: -24px; }
        }
    </style>
</head>
<body>

    <!-- NAV -->
    <nav>
        <div class="logo">
            <a href="index.html"><img src="Isotipo_tetra.png" alt="TETRA"></a>
        </div>
        <div class="nav-links">
            <a href="index.html"    class="nav-link">Inicio</a>
            <a href="nosotros.html" class="nav-link">Nosotros</a>
            <a href="blog.html"     class="nav-link active">Blog</a>
        </div>
        <a href="#" class="nav-cta" id="navCta" onclick="openWhatsApp()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
            </svg>
            <span>Escríbenos</span>
        </a>
    </nav>

    <!-- CONTENIDO DINÁMICO -->
    <div id="article-root">
        <div class="article-state">
            <div class="state-icon">⏳</div>
            <h2>Cargando artículo...</h2>
        </div>
    </div>

    <!-- WHATSAPP FLOTANTE -->
    <a href="#" class="whatsapp-float" id="whatsappFloat" onclick="openWhatsApp()">
        <span class="whatsapp-tooltip">¡Hablemos! 👋</span>
        <svg viewBox="0 0 24 24">
            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
        </svg>
    </a>

    <script>
        // ── WhatsApp float ──
        const whatsappFloat = document.getElementById('whatsappFloat');
        const navCta        = document.getElementById('navCta');
        function updateFloat() {
            const scrolled = window.scrollY > 300;
            navCta.classList.toggle('visible', scrolled);
            whatsappFloat.classList.toggle('visible', scrolled);
        }
        window.addEventListener('scroll', updateFloat);

        function openWhatsApp() {
            const phone   = '525610584845';
            const message = encodeURIComponent('Hola 👋 Estoy buscando apoyo con temas de TI. Necesito ayuda con...');
            window.open(`https://wa.me/${phone}?text=${message}`, '_blank');
        }

        // ── Nav link animation ──
        document.querySelectorAll('.nav-link').forEach(link => {
            const text = link.textContent.trim();
            link.innerHTML = `<span class="nav-txt-a">${text}</span><span class="nav-txt-b" aria-hidden="true">${text}</span>`;
        });

        // ── Load & render ──
        const postId = new URLSearchParams(window.location.search).get('id');

        const FALLBACK_POSTS = [
            { id:'fb1', title:'Inteligencia Artificial: Cómo transformará tu negocio en 2026',
              category:'IA', excerpt:'Descubre las tendencias de IA que están revolucionando la forma en que las empresas operan y cómo puedes aprovecharlas para impulsar tu crecimiento.',
              date:'1 Febrero, 2026', image:'🤖', featured:true, published:true },
            { id:'fb2', title:'5 Amenazas de ciberseguridad que debes conocer este año',
              category:'Seguridad', excerpt:'Protege tu empresa con estos consejos esenciales sobre las nuevas amenazas digitales.',
              date:'28 Enero, 2026', image:'🔒', published:true },
            { id:'fb3', title:'Migración a la nube: Guía completa para PyMEs',
              category:'Cloud', excerpt:'Todo lo que necesitas saber para llevar tu infraestructura al siguiente nivel.',
              date:'25 Enero, 2026', image:'☁️', published:true },
            { id:'fb4', title:'WiFi 7: El futuro de la conectividad empresarial',
              category:'Redes', excerpt:'Conoce las ventajas del nuevo estándar y cómo preparar tu infraestructura.',
              date:'22 Enero, 2026', image:'🌐', published:true },
            { id:'fb5', title:'Herramientas de colaboración que transforman equipos',
              category:'Productividad', excerpt:'Las mejores soluciones para trabajo remoto e híbrido en 2026.',
              date:'18 Enero, 2026', image:'💼', published:true },
            { id:'fb6', title:'Big Data para pequeñas empresas: Sí es posible',
              category:'Data', excerpt:'Cómo aprovechar el análisis de datos sin necesidad de grandes inversiones.',
              date:'15 Enero, 2026', image:'📊', published:true },
            { id:'fb7', title:'Videovigilancia inteligente: Más allá de las cámaras',
              category:'CCTV', excerpt:'Analítica de video y las nuevas capacidades que protegen tu negocio.',
              date:'12 Enero, 2026', image:'🛡️', published:true },
        ];

        function renderArticle(posts) {
            const root = document.getElementById('article-root');

            if (!postId) {
                root.innerHTML = notFound('No se especificó un artículo.');
                return;
            }

            const post = posts.find(p => p.id === postId);

            if (!post) {
                root.innerHTML = notFound('El artículo no existe o fue eliminado.');
                return;
            }

            // Update page title
            document.title = post.title + ' — TETRA 4.0';

            // Image
            const coverSrc = post.imageArticle || post.image || '';
            const isURL = coverSrc && (coverSrc.startsWith('data:') || coverSrc.startsWith('http') || coverSrc.startsWith('/') || coverSrc.startsWith('.'));
            const coverHTML = isURL
                ? `<div class="article-cover"><img src="${coverSrc}" alt="${post.title}"></div>`
                : `<div class="article-cover"><div class="article-cover-emoji">${coverSrc || '📄'}</div></div>`;

            // Body
            const bodyContent = post.body
                ? post.body
                : `<div class="no-body-notice">
                       📝 El contenido completo de este artículo estará disponible próximamente.<br>
                       ¿Tienes preguntas? <a href="index.html#contacto">Contáctanos directamente.</a>
                   </div>`;

            root.innerHTML = `
                <section class="article-hero">
                    <div class="article-hero-inner">
                        <span class="article-category">${post.category || 'Blog'}</span>
                        <h1>${post.title}</h1>
                        <div class="article-meta">
                            <span>📅 ${post.date || ''}</span>
                            <span>· TETRA 4.0</span>
                        </div>
                    </div>
                </section>

                ${coverHTML}

                <div class="article-nav" style="padding-top: 48px;">
                    <a href="blog.html" class="back-link">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <path d="M19 12H5M5 12l7 7M5 12l7-7"/>
                        </svg>
                        Volver al Blog
                    </a>
                </div>

                <div class="article-body">
                    <p class="article-excerpt-big">${post.excerpt}</p>
                    ${bodyContent}
                </div>

                <div class="article-nav" style="padding-bottom: 80px; border-top: 1px solid #e5e7eb; padding-top: 28px;">
                    <a href="blog.html" class="back-link">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <path d="M19 12H5M5 12l7 7M5 12l7-7"/>
                        </svg>
                        Ver más artículos
                    </a>
                </div>
            `;
        }

        function notFound(msg) {
            return `
                <div class="article-state">
                    <div class="state-icon">🔍</div>
                    <h2>Artículo no encontrado</h2>
                    <p>${msg}</p>
                    <p style="margin-top:16px;"><a href="blog.html">← Volver al Blog</a></p>
                </div>`;
        }

        // Carga: posts.json → localStorage → fallback
        fetch('posts.json?v=' + Date.now())
            .then(r => { if (!r.ok) throw new Error('no file'); return r.json(); })
            .then(data => renderArticle(Array.isArray(data) ? data : []))
            .catch(() => {
                try {
                    const local = JSON.parse(localStorage.getItem('tetra_blog_posts'));
                    renderArticle(Array.isArray(local) && local.length ? local : FALLBACK_POSTS);
                } catch (e) {
                    renderArticle(FALLBACK_POSTS);
                }
            });
    </script>
</body>
</html>
